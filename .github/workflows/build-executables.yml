name: Build Executables

on:
  push:
    paths:
      - 'git_auto_commit*'
      - '.github/workflows/build-executables.yml'

jobs:
  build:
    name: Build Executable
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install PyInstaller
        run:
          pip install pyinstaller

      - name: Build Executable
        run: |
          pyinstaller --onefile git_auto_commit.py

      - name: Upload Executable Artifact
        uses: actions/upload-artifact@v4
        with:
          name: executable-${{ matrix.os }}
          path: |
            # For Windows
            ${{ github.workspace }}\dist\git_auto_commit.exe
            # For Linux
            ${{ github.workspace }}/dist/git_auto_commit
          if-no-files-found: ignore # 'warn' or 'error' are also available, defaults to `warn`
          overwrite: true

  commit:
    name: Commit Executables to Repository
    runs-on: ubuntu-latest
    needs: build
    permissions:
          contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Executable Artifact
        uses: actions/download-artifact@v4

      - name: List files
        run: ls -R

      - name: Move Executables to Root
        run: |
          mv executable-windows-latest/git_auto_commit ./git_auto_commit.exe
          mv executable-ubuntu-latest/git_auto_commit ./git_auto_commit
          rm -rf executable-*

      - name: Check for changes
        id: check_changes
        run: echo "::set-output name=changes::$(git status --porcelain)"

      - name: Commit Executables to Repository
        if: steps.check_changes.outputs.changes != ''
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add git_auto_commit.exe git_auto_commit
          git commit -m "Add executable files"
          git push origin main
